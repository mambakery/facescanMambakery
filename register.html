<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนพนักงาน — แหม่มเบเกอรี่</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a0d2e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      position: relative;
    }

    body::before {
      content: ''; position: fixed;
      width: 420px; height: 420px;
      background: #9333ea; border-radius: 50%;
      filter: blur(110px); opacity: 0.1;
      top: -100px; left: -100px;
      pointer-events: none; z-index: 0;
    }

    .container {
      width: 100%; max-width: 520px;
      position: relative; z-index: 1;
      animation: fadeIn 0.5s ease;
    }

    /* Header */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #64748b; text-decoration: none; font-size: 0.85em;
      padding: 6px 12px; border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.25s ease;
    }
    .back-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.1); }

    .admin-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(147,51,234,0.15);
      border: 1px solid rgba(147,51,234,0.3);
      border-radius: 20px; padding: 4px 12px;
      font-size: 0.78em; font-weight: 600; color: #c084fc;
    }

    .logout-btn {
      background: none; border: none; cursor: pointer;
      color: #475569; font-size: 0.8em; padding: 4px 8px;
      border-radius: 8px; font-family: 'Sarabun', sans-serif;
      transition: color 0.2s;
    }
    .logout-btn:hover { color: #f87171; }

    .page-header { text-align: center; margin-bottom: 22px; }

    h2 {
      font-size: 1.6em; font-weight: 700;
      background: linear-gradient(135deg, #f0abfc, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .instruction { font-size: 0.82em; color: #64748b; line-height: 1.6; }

    /* Step dots */
    .step-dots {
      display: flex; justify-content: center; gap: 12px;
      margin: 14px 0 20px;
    }
    .dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .dot {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #475569;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: linear-gradient(135deg, #9333ea, #7c3aed);
      border-color: transparent;
      color: white;
      box-shadow: 0 0 12px rgba(147,51,234,0.5);
    }
    .dot-label { font-size: 0.62em; color: #334155; font-weight: 600; }

    /* Status */
    #status {
      font-size: 0.88em; color: #64748b;
      margin-bottom: 14px; min-height: 22px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(147,51,234,0.3);
      border-top-color: #9333ea; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Video */
    .video-wrapper {
      position: relative; border-radius: 20px; overflow: hidden;
      border: 2px solid rgba(147,51,234,0.4);
      box-shadow: 0 0 30px rgba(147,51,234,0.18), inset 0 0 30px rgba(0,0,0,0.3);
      background: #0a0a1a;
      width: 100%; max-width: 480px; margin: 0 auto;
    }
    video {
      width: 100%; display: block;
      transform: scaleX(-1);
      border-radius: 18px;
    }

    /* Corner scanner frame */
    .frame-corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: #9333ea; border-style: solid; opacity: 0.7;
    }
    .fc-tl { top: 12px; left: 12px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .fc-tr { top: 12px; right: 12px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .fc-bl { bottom: 12px; left: 12px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .fc-br { bottom: 12px; right: 12px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* Form */
    .form-section {
      margin-top: 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; padding: 22px 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    label.field-label {
      display: block; font-size: 0.8em; font-weight: 600;
      color: #94a3b8; margin-bottom: 6px; letter-spacing: 0.04em;
    }
    input[type=text] {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: #e2e8f0;
      font-size: 15px; font-family: 'Sarabun', sans-serif;
      outline: none; transition: all 0.3s ease;
      margin-bottom: 16px;
    }
    input[type=text]::placeholder { color: #475569; }
    input[type=text]:focus {
      border-color: rgba(147,51,234,0.5);
      background: rgba(147,51,234,0.06);
      box-shadow: 0 0 0 3px rgba(147,51,234,0.12);
    }

    #btnSave {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #9333ea, #7c3aed);
      color: white; border: none; border-radius: 50px;
      font-size: 16px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(147,51,234,0.35);
    }
    #btnSave:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(147,51,234,0.5);
    }
    #btnSave:disabled {
      background: rgba(255,255,255,0.08); color: #475569;
      box-shadow: none; cursor: default;
    }

    .count-badge {
      background: rgba(255,255,255,0.2);
      padding: 2px 10px; border-radius: 20px; font-size: 13px;
    }

    /* Divider */
    .divider {
      border: none; border-top: 1px solid rgba(255,255,255,0.07);
      margin: 18px 0;
    }

    /* Employee List */
    .emp-section {
      margin-top: 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; padding: 20px;
    }
    .emp-title {
      font-size: 0.88em; font-weight: 700; color: #c084fc;
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .emp-list { display: flex; flex-direction: column; gap: 8px; }
    .emp-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 10px 14px;
    }
    .emp-name { font-size: 0.9em; color: #e2e8f0; }
    .emp-count { font-size: 0.75em; color: #64748b; margin-top: 2px; }
    .btn-delete {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5; border-radius: 8px; padding: 5px 10px;
      font-size: 0.78em; cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }
    .emp-empty { font-size: 0.85em; color: #334155; text-align: center; padding: 10px; }

    #msg {
      margin-top: 14px; min-height: 24px;
      font-size: 0.9em; font-weight: 600; text-align: center;
    }
    .msg-success { color: #34d399; }
    .msg-error   { color: #f87171; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin   { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับ</a>
    <div class="admin-chip">🔒 Admin Session</div>
    <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
  </div>

  <div class="page-header">
    <h2>👤 ลงทะเบียนพนักงาน</h2>
    <p class="instruction">บันทึก 3 มุม: หน้าตรง / หันซ้ายเล็กน้อย / หันขวาเล็กน้อย</p>
  </div>

  <!-- Step dots -->
  <div class="step-dots">
    <div class="dot-wrap">
      <div class="dot" id="dot1">1</div>
      <div class="dot-label">หน้าตรง</div>
    </div>
    <div class="dot-wrap">
      <div class="dot" id="dot2">2</div>
      <div class="dot-label">หันซ้าย</div>
    </div>
    <div class="dot-wrap">
      <div class="dot" id="dot3">3</div>
      <div class="dot-label">หันขวา</div>
    </div>
  </div>

  <div id="status">
    <span class="spinner"></span> กำลังโหลด AI Model...
  </div>

  <div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <div class="frame-corner fc-tl"></div>
    <div class="frame-corner fc-tr"></div>
    <div class="frame-corner fc-bl"></div>
    <div class="frame-corner fc-br"></div>
  </div>

  <div class="form-section">
    <label class="field-label">ชื่อ-นามสกุลพนักงาน</label>
    <input type="text" id="username" placeholder="เช่น สมใจ ใจดี">

    <button id="btnSave" onclick="saveFace()" disabled>
      📸 บันทึกใบหน้า
      <span id="saveCount" class="count-badge">0 / 3</span>
    </button>

    <div id="msg"></div>

    <div class="divider"></div>

    <div style="font-size:0.78em; color:#334155; text-align:center;">
      💡 บันทึกอย่างน้อย 3 มุม เพื่อความแม่นยำสูงสุด
    </div>
  </div>

  <!-- Employee List -->
  <div class="emp-section">
    <div class="emp-title">👥 พนักงานที่ลงทะเบียนแล้ว</div>
    <div class="emp-list" id="empList">
      <div class="emp-empty">กำลังโหลด...</div>
    </div>
  </div>

</div>

<script>
  // ── Auth Guard ──────────────────────────────────────────
  let adminToken = requireAdminOrRedirect();

  const API_URL   = getApiUrl();
  const video     = document.getElementById('video');
  const statusDiv = document.getElementById('status');
  const btnSave   = document.getElementById('btnSave');
  const msgDiv    = document.getElementById('msg');
  const countSpan = document.getElementById('saveCount');
  let saveCounter = 0;

  if (!adminToken) {
    // requireAdminOrRedirect จะ redirect ให้แล้ว
  } else if (!API_URL || API_URL.includes('YOUR_SCRIPT_ID')) {
    statusDiv.innerHTML = '<span style="color:#f87171">❌ ยังไม่ได้ตั้งค่า API URL</span>';
  } else {
    window.addEventListener('load', () => {
      initModels();
      loadEmployeeList();
    });
  }

  function updateDots() {
    [1, 2, 3].forEach(i => {
      document.getElementById('dot' + i).className = 'dot' + (i <= saveCounter ? ' active' : '');
    });
    countSpan.innerText = saveCounter + ' / 3';
  }

  async function initModels() {
    try {
      const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      startCamera();
    } catch (e) {
      statusDiv.innerHTML = '<span style="color:#f87171">❌ โหลด AI Model ล้มเหลว: ' + e.message + '</span>';
    }
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        statusDiv.innerText = '✅ กล้องพร้อม — กดบันทึกใบหน้า';
        statusDiv.style.color = '#34d399';
        btnSave.disabled = false;
      })
      .catch(err => {
        statusDiv.innerHTML = '<span style="color:#f87171">❌ เปิดกล้องไม่ได้: ' + err.message + '</span>';
      });
  }

  async function saveFace() {
    const name = document.getElementById('username').value.trim();
    if (!name) return alert('กรุณาใส่ชื่อ-นามสกุลก่อน');

    adminToken = getAdminToken();
    if (!adminToken) {
      alert('Session หมดอายุ กรุณา login ใหม่');
      window.location.href = 'login.html?next=register.html';
      return;
    }

    btnSave.disabled = true;
    btnSave.innerHTML = '⏳ กำลังประมวลผล... <span class="count-badge">' + saveCounter + ' / 3</span>';
    msgDiv.innerText = '';

    const detection = await faceapi
      .detectSingleFace(video)
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) {
      alert('ไม่พบใบหน้า! กรุณามองกล้องให้ชัดเจน แสงเพียงพอ');
      btnSave.disabled = false;
      updateButtonLabel();
      return;
    }

    const descriptorArray = Array.from(detection.descriptor);

    try {
      const res  = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'registerUser',
          name,
          faceDescriptor: descriptorArray,
          adminToken
        })
      });
      const data = await res.json();

      if (data.error === 'UNAUTHORIZED') {
        alert('ไม่มีสิทธิ์ กรุณา login ใหม่');
        window.location.href = 'login.html?next=register.html';
        return;
      }

      saveCounter++;
      updateDots();

      const angle = saveCounter === 1 ? 'หน้าตรง' : saveCounter === 2 ? 'หันซ้ายเล็กน้อย' : 'หันขวาเล็กน้อย';
      const nextAngle = saveCounter < 3 ? '→ ต่อไป: ' + (saveCounter === 1 ? 'หันซ้ายเล็กน้อย' : 'หันขวาเล็กน้อย') : '';

      msgDiv.innerHTML = '<span class="msg-success">✅ บันทึกมุมที่ ' + saveCounter + ' (' + angle + ') สำเร็จ! ' + nextAngle + '</span>';

      if (saveCounter >= 3) {
        msgDiv.innerHTML = '<span class="msg-success">🎉 บันทึกครบ 3 มุมแล้ว! ' + name + ' ลงทะเบียนเสร็จสมบูรณ์</span>';
        saveCounter = 0;
        updateDots();
        document.getElementById('username').value = '';
        loadEmployeeList();
      }

      btnSave.disabled = false;
      updateButtonLabel();
    } catch (e) {
      msgDiv.innerHTML = '<span class="msg-error">❌ บันทึกล้มเหลว: ' + e.message + '</span>';
      btnSave.disabled = false;
      updateButtonLabel();
    }
  }

  function updateButtonLabel() {
    const label = saveCounter === 0 ? 'บันทึกใบหน้า' : 'บันทึกมุมที่ ' + (saveCounter + 1);
    btnSave.innerHTML = '📸 ' + label + ' <span class="count-badge" id="saveCount">' + saveCounter + ' / 3</span>';
  }

  async function loadEmployeeList() {
    const listDiv = document.getElementById('empList');
    listDiv.innerHTML = '<div class="emp-empty">กำลังโหลด...</div>';

    try {
      const data = await fetch(API_URL + '?action=getKnownFaces').then(r => r.json());
      if (!data || data.length === 0) {
        listDiv.innerHTML = '<div class="emp-empty">ยังไม่มีพนักงานในระบบ</div>';
        return;
      }

      // Aggregate by name
      const counts = {};
      data.forEach(u => {
        counts[u.label] = (counts[u.label] || 0) + 1;
      });

      listDiv.innerHTML = '';
      Object.entries(counts).forEach(([name, count]) => {
        const el = document.createElement('div');
        el.className = 'emp-item';
        el.innerHTML = `
          <div>
            <div class="emp-name">👤 ${name}</div>
            <div class="emp-count">${count} มุมที่บันทึก</div>
          </div>
          <button class="btn-delete" onclick="deleteEmployee('${name.replace(/'/g, "\\'")}')">🗑 ลบ</button>
        `;
        listDiv.appendChild(el);
      });
    } catch (e) {
      listDiv.innerHTML = '<div class="emp-empty" style="color:#f87171">โหลดข้อมูลไม่ได้</div>';
    }
  }

  async function deleteEmployee(name) {
    if (!confirm('ยืนยันลบข้อมูลของ ' + name + ' ออกจากระบบ?')) return;

    const token = getAdminToken();
    if (!token) { alert('Session หมดอายุ'); window.location.href = 'login.html?next=register.html'; return; }

    try {
      const res  = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'deleteUser', name, adminToken: token })
      });
      const data = await res.json();
      alert(data.success ? '✅ ' + data.message : '❌ ' + data.message);
      if (data.success) loadEmployeeList();
    } catch (e) {
      alert('❌ เกิดข้อผิดพลาด: ' + e.message);
    }
  }

  function doLogout() {
    clearAdminSession();
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
